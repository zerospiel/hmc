{{- $global := .Values.global | default dict }}
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: K0smotronControlPlane
metadata:
  name: {{ include "k0smotroncontrolplane.name" . }}
spec:
  replicas: {{ .Values.controlPlaneNumber }}
  version: {{ .Values.k0s.version | replace "+" "-"  | quote }}
  {{- with .Values.k0smotron.service }}
  service:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if $global.registry }}
  image: {{ $global.registry }}/k0sproject/k0s
  {{- end }}
  {{- if or $global.registryCertSecret .Values.auth.configSecret.name .Values.encryption.configSecret.name .Values.dataSource.caSecret.name .Values.audit.policyRef.name }}
  mounts:
    {{- if $global.registryCertSecret }}
    - path: /usr/local/share/ca-certificates/registry
      secret:
        defaultMode: 420
        items:
          - key: ca.crt
            path: ca.crt
        secretName: {{ $global.registryCertSecret }}
    {{- end }}
    {{- if .Values.auth.configSecret.name }}
    - path: {{ include "authentication-config.dir" . }}
      secret:
        defaultMode: 420
        items:
          - key: {{ .Values.auth.configSecret.key  | quote }}
            path: {{ include "authentication-config.file" . }}
        secretName: {{ .Values.auth.configSecret.name  | quote }}
    {{- end }}
    {{- if .Values.encryption.configSecret.name }}
    - path: {{ include "encryption-config.dir" . }}
      secret:
        defaultMode: 420
        items:
          - key: {{ default "config" .Values.encryption.configSecret.key  | quote }}
            path: {{ include "encryption-config.file" . }}
        secretName: {{ .Values.encryption.configSecret.name  | quote }}
    {{- end }}
    {{- if .Values.dataSource.caSecret.name }}
    - path: /var/lib/k0s/kine-ca
      secret:
        defaultMode: 420
        items:
          - key: {{ .Values.dataSource.caSecret.key  | quote }}
            path: ca.crt
        secretName: {{ .Values.dataSource.caSecret.name  | quote }}
    {{- end }}
    {{- if .Values.audit.policyRef.name }}
    - path: {{ include "audit-policy.dir" . }}
      configMap:
        defaultMode: 420
        items:
          - key: {{ .Values.audit.policyRef.key  | quote }}
            path: {{ include "audit-policy.file" . }}
        name: {{ .Values.audit.policyRef.name  | quote }}
    {{- end }}
  {{- end }}
  {{- if or .Values.dataSource.kineDataSourceSecretName $global.registry .Values.storage.etcd.autoDeletePVCs }}
  storage:
    {{- if .Values.dataSource.kineDataSourceSecretName }}
    type: kine
    kine:
      dataSourceSecretName: {{ .Values.dataSource.kineDataSourceSecretName  | quote }}
    {{- else }}
    etcd:
      {{- if $global.registry }}
      image: "{{ $global.registry }}/k0sproject/etcd:v3.5.13"
      {{- end }}
      {{- if .Values.storage.etcd.autoDeletePVCs }}
      autoDeletePVCs: true
      {{- end }}
    {{- end }}
  {{- end }}
  manifests:
    - name: manifests
      configMap:
        name: {{ include "k0smotroncontrolplane.name" . }}-manifests
    {{- if $global.registryCredentialSecret }}
    - name: helm-registry-credentials
      secret:
        secretName: {{ $global.registryCredentialSecret }}
        items:
          - key: registryCredential
            path: helm-registry-credentials.yaml
    {{- end }}
  controlPlaneFlags:
    - --enable-cloud-provider=true
    - --debug=true
    {{- range $arg := .Values.k0smotron.controlPlaneFlags }}
    - {{ toYaml $arg }}
    {{- end }}
  k0sConfig:
    apiVersion: k0s.k0sproject.io/v1beta1
    kind: ClusterConfig
    metadata:
      name: k0s
    spec:
      api:
        extraArgs:
          {{- if .Values.auth.configSecret.name }}
          authentication-config: {{ include "authentication-config.fullpath" . }}
          {{- end }}
          {{- if .Values.encryption.configSecret.name }}
          encryption-provider-config: {{ include "encryption-config.fullpath" . }}
          {{- if .Values.encryption.automaticReload }}
          encryption-provider-config-automatic-reload: "true"
          {{- end }}
          {{- end }}
          {{- if .Values.audit.policyRef.name }}
          audit-policy-file: {{ include "audit-policy.fullpath" . }}
          audit-log-path: "-"
          {{- end }}
          {{- with .Values.k0s.api.extraArgs }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
      {{- with .Values.k0s.network }}
      network: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- if $global.registry }}
      images:
        repository: "{{ $global.registry }}"
      {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k0smotroncontrolplane.name" . }}-manifests
data:
  1-chart-cloud-provider-azure.yaml: |
    apiVersion: helm.k0sproject.io/v1beta1
    kind: Chart
    metadata:
      name: cloud-provider-azure
      namespace: kube-system
    spec:
      {{- if not $global.registry }}
      repository:
        url: https://charts.mirantis.com
      {{- end }}
      {{- if or $global.registryCredentialSecret $global.registryCertSecret }}
      repository:
        {{- if $global.registryCredentialSecret }}
        configFrom:
          secretRef:
            name: {{ $global.registryCredentialSecret }}
        {{- end }}
        {{- if $global.registryCertSecret }}
        caFile: /usr/local/share/ca-certificates/registry/ca.crt
        {{- end }}
      {{- end }}
      {{- if $global.registry }}
      chartName: oci://{{ $global.registry }}/charts/cloud-provider-azure
      {{- else }}
      chartName: cloud-provider-azure/cloud-provider-azure
      {{- end }}
      version: 1.34.6
      order: 1
      releaseName: cloud-provider-azure
      namespace: kube-system
      values: |
        cloudControllerManager:
          cloudConfigSecretName: azure-cloud-provider
          nodeSelector:
            node-role.kubernetes.io/control-plane: null
          {{- if $global.registry }}
          imageRepository: {{ $global.registry }}
          {{- end }}
          imageTag: v1.34.3
        cloudNodeManager:
          imageTag: v1.34.3
        {{- if $global.registry }}
          imageRepository: {{ $global.registry }}
          healthProbeProxyImage: {{ $global.registry }}/kubernetes/azure-health-probe-proxy:v1.34.3
          healthProbeProxyImageWindows: {{ $global.registry }}/kubernetes/azure-health-probe-proxy:v1.34.3
        {{- end }}
  2-chart-azuredisk-csi-driver.yaml: |
    apiVersion: helm.k0sproject.io/v1beta1
    kind: Chart
    metadata:
      name: azuredisk-csi-driver
      namespace: kube-system
    spec:
      {{- if not $global.registry }}
      repository:
        url: https://raw.githubusercontent.com/kubernetes-sigs/azuredisk-csi-driver/master/charts
      {{- end }}
      {{- if or $global.registryCredentialSecret $global.registryCertSecret }}
      repository:
        {{- if $global.registryCredentialSecret }}
        configFrom:
          secretRef:
            name: {{ $global.registryCredentialSecret }}
        {{- end }}
        {{- if $global.registryCertSecret }}
        caFile: /usr/local/share/ca-certificates/registry/ca.crt
        {{- end }}
      {{- end }}
      {{- if $global.registry }}
      chartName: oci://{{ $global.registry }}/charts/azuredisk-csi-driver
      {{- else }}
      chartName: azuredisk-csi-driver/azuredisk-csi-driver
      {{- end }}
      version: 1.34.3
      order: 2
      releaseName: azuredisk-csi-driver
      namespace: kube-system
      values: |
        {{- if $global.registry }}
        image:
          baseRepo: {{ $global.registry }}
          azuredisk:
            repository: /kubernetes-csi/azuredisk-csi
          csiProvisioner:
            repository: /kubernetes-csi/csi-provisioner
          csiAttacher:
            repository: /kubernetes-csi/csi-attacher
          csiResizer:
            repository: /kubernetes-csi/csi-resizer
          livenessProbe:
            repository: /kubernetes-csi/livenessprobe
          nodeDriverRegistrar:
            repository: /kubernetes-csi/csi-node-driver-registrar
        snapshot:
          image:
            csiSnapshotter:
              repository: /kubernetes-csi/csi-snapshotter
            csiSnapshotController:
              repository: /kubernetes-csi/snapshot-controller
        {{- end }}
        controller:
          cloudConfigSecretName: azure-cloud-provider
        node:
          cloudConfigSecretName: azure-cloud-provider
        linux:
          kubelet: "/var/lib/k0s/kubelet"
        windows:
          enabled: false
