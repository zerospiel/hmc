apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureMachineTemplate
metadata:
  name: {{ include "azuremachinetemplate.name" . }}
spec:
  template:
    spec:
      osDisk:
        diskSizeGB: {{ .Values.rootVolumeSize }}
        osType: Linux
      {{- with .Values.sshPublicKey | default "" | trim }}
      sshPublicKey: {{ . | quote }}
      {{- end }}
      vmSize: {{ required ".Values.vmSize is required" .Values.vmSize  | quote }}
      {{- with .Values.image }}
      image:
        {{- if .id }}
        id: {{ .id }}
        {{- else if .computeGallery }}
        computeGallery:
          {{- toYaml .computeGallery | nindent 10 }}
        {{- else if .marketplace }}
        marketplace:
          {{- toYaml .marketplace | nindent 10 }}
        {{- end }}
      {{- end }}
