{{- $global := .Values.global | default dict }}
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: K0smotronControlPlane
metadata:
  name: {{ include "k0smotroncontrolplane.name" . }}
spec:
  replicas: 3
  # dirty hack
  version: {{ .Values.k0s.version | replace "+" "-"  | quote }}
  {{- with .Values.k0smotron.service }}
  service:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if $global.registry }}
  image: {{ $global.registry }}/k0sproject/k0s
  {{- end }}
  {{- if not .Values.dataSource.kineDataSourceSecretName }}
  {{- if or $global.registry .Values.storage.etcd.autoDeletePVCs }}
  etcd:
    {{- if $global.registry }}
    image: "{{ $global.registry }}/k0sproject/etcd:v3.5.13"
    {{- end }}
    {{- if .Values.storage.etcd.autoDeletePVCs }}
    autoDeletePVCs: true
    {{- end }}
  {{- end }}
  {{- end }}
  {{- if or $global.registryCertSecret .Values.auth.configSecret.name .Values.encryption.configSecret.name .Values.dataSource.caSecret.name .Values.audit.policyRef.name }}
  mounts:
    {{- if $global.registryCertSecret }}
    - path: /usr/local/share/ca-certificates/registry
      secret:
        defaultMode: 420
        items:
          - key: ca.crt
            path: ca.crt
        secretName: {{ $global.registryCertSecret }}
    {{- end }}
    {{- if .Values.auth.configSecret.name }}
    - path: {{ include "authentication-config.dir" . }}
      secret:
        defaultMode: 420
        items:
          - key: {{ .Values.auth.configSecret.key  | quote }}
            path: {{ include "authentication-config.file" . }}
        secretName: {{ .Values.auth.configSecret.name  | quote }}
    {{- end }}
    {{- if .Values.encryption.configSecret.name }}
    - path: {{ include "encryption-config.dir" . }}
      secret:
        defaultMode: 420
        items:
          - key: {{ default "config" .Values.encryption.configSecret.key  | quote }}
            path: {{ include "encryption-config.file" . }}
        secretName: {{ .Values.encryption.configSecret.name  | quote }}
    {{- end }}
    {{- if .Values.dataSource.caSecret.name }}
    - path: /var/lib/k0s/kine-ca
      secret:
        defaultMode: 420
        items:
          - key: {{ .Values.dataSource.caSecret.key  | quote }}
            path: ca.crt
        secretName: {{ .Values.dataSource.caSecret.name  | quote }}
    {{- end }}
    {{- if .Values.audit.policyRef.name }}
    - path: {{ include "audit-policy.dir" . }}
      configMap:
        defaultMode: 420
        items:
          - key: {{ .Values.audit.policyRef.key  | quote }}
            path: {{ include "audit-policy.file" . }}
        name: {{ .Values.audit.policyRef.name  | quote }}
    {{- end }}
  {{- end }}
  {{- if .Values.dataSource.kineDataSourceSecretName }}
  kineDataSourceSecretName: {{ .Values.dataSource.kineDataSourceSecretName  | quote }}
  {{- end }}
  manifests:
    - name: manifests
      configMap:
        name: {{ include "k0smotroncontrolplane.name" . }}-manifests
    {{- if $global.registryCredentialSecret }}
    - name: helm-registry-credentials
      secret:
        secretName: {{ $global.registryCredentialSecret }}
        items:
          - key: registryCredential
            path: helm-registry-credentials.yaml
    {{- end }}
  controllerPlaneFlags:
    - --enable-cloud-provider=true
    - --debug=true
    {{- range $arg := .Values.k0smotron.controllerPlaneFlags }}
    - {{ toYaml $arg }}
    {{- end }}
  k0sConfig:
    apiVersion: k0s.k0sproject.io/v1beta1
    kind: ClusterConfig
    metadata:
      name: k0s
    spec:
      api:
        extraArgs:
          {{- if .Values.auth.configSecret.name }}
          authentication-config: {{ include "authentication-config.fullpath" . }}
          {{- end }}
          {{- if .Values.encryption.configSecret.name }}
          encryption-provider-config: {{ include "encryption-config.fullpath" . }}
          {{- if .Values.encryption.automaticReload }}
          encryption-provider-config-automatic-reload: "true"
          {{- end }}
          {{- end }}
          {{- if .Values.audit.policyRef.name }}
          audit-policy-file: {{ include "audit-policy.fullpath" . }}
          audit-log-path: "-"
          {{- end }}
          {{- with .Values.k0s.api.extraArgs }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
      {{- with .Values.k0s.network }}
      network: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- if $global.registry }}
      images:
        repository: "{{ $global.registry }}"
      {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k0smotroncontrolplane.name" . }}-manifests
data:
  1-chart-aws-cloud-controller-manager.yaml: |
    apiVersion: helm.k0sproject.io/v1beta1
    kind: Chart
    metadata:
      name: aws-cloud-controller-manager
      namespace: kube-system
    spec:
      {{- if not $global.registry }}
      repository:
        url: https://charts.mirantis.com
      {{- end }}
      {{- if or $global.registryCredentialSecret $global.registryCertSecret }}
      repository:
        {{- if $global.registryCredentialSecret }}
        configFrom:
          secretRef:
            name: {{ $global.registryCredentialSecret }}
        {{- end }}
        {{- if $global.registryCertSecret }}
        caFile: /usr/local/share/ca-certificates/registry/ca.crt
        {{- end }}
      {{- end }}
      {{- if $global.registry }}
      chartName: oci://{{ $global.registry }}/charts/aws-cloud-controller-manager
      {{- else }}
      chartName: aws-cloud-controller-manager/aws-cloud-controller-manager
      {{- end }}
      version: 0.0.11
      releaseName: aws-cloud-controller-manager
      namespace: kube-system
      values: |
        image:
          {{- if $global.registry }}
          repository: {{ $global.registry }}/provider-aws/cloud-controller-manager
          {{- end }}
          tag: v1.34.0
        args:
          - --v=2
          - --cloud-provider=aws
          - --cluster-cidr={{ first .Values.clusterNetwork.pods.cidrBlocks }}
          - --allocate-node-cidrs=true
          - --cluster-name={{ include "cluster.name" . }}
        cloudConfig:
          enabled: true
          global:
            KubernetesClusterID: {{ required ".Values.managementClusterName is required on AWS hosted deployment" .Values.managementClusterName  | quote }}
        # Removing the default `node-role.kubernetes.io/control-plane` node selector
        # TODO: it does not work
        nodeSelector:
          node-role.kubernetes.io/control-plane: null
  2-chart-aws-ebs-csi-driver.yaml: |
    apiVersion: helm.k0sproject.io/v1beta1
    kind: Chart
    metadata:
      name: aws-ebs-csi-driver
      namespace: kube-system
    spec:
      {{- if not $global.registry }}
      repository:
        url: https://kubernetes-sigs.github.io/aws-ebs-csi-driver
      {{- end }}
      {{- if or $global.registryCredentialSecret $global.registryCertSecret }}
      repository:
        {{- if $global.registryCredentialSecret }}
        configFrom:
          secretRef:
            name: {{ $global.registryCredentialSecret }}
        {{- end }}
        {{- if $global.registryCertSecret }}
        caFile: /usr/local/share/ca-certificates/registry/ca.crt
        {{- end }}
      {{- end }}
      {{- if $global.registry }}
      chartName: oci://{{ $global.registry }}/charts/aws-ebs-csi-driver
      {{- else }}
      chartName: aws-ebs-csi-driver/aws-ebs-csi-driver
      {{- end }}
      version: 2.58.0
      releaseName: aws-ebs-csi-driver
      namespace: kube-system
      values: |
        {{- if $global.registry }}
        image:
          repository: {{ $global.registry }}/ebs-csi-driver/aws-ebs-csi-driver
        sidecars:
          provisioner:
            image:
              repository: {{ $global.registry }}/csi-components/csi-provisioner
          attacher:
            image:
              repository: {{ $global.registry }}/csi-components/csi-attacher
          snapshotter:
            image:
              repository: {{ $global.registry }}/csi-components/csi-snapshotter
          livenessProbe:
            image:
              repository: {{ $global.registry }}/csi-components/livenessprobe
          resizer:
            image:
              repository: {{ $global.registry }}/csi-components/csi-resizer
          nodeDriverRegistrar:
            image:
              repository: {{ $global.registry }}/csi-components/csi-node-driver-registrar
          volumemodifier:
            image:
              repository: {{ $global.registry }}/ebs-csi-driver/volume-modifier-for-k8s
        {{- end }}
        defaultStorageClass:
          enabled: true
        node:
          kubeletPath: /var/lib/k0s/kubelet
