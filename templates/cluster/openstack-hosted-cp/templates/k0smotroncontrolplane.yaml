{{- $global := .Values.global | default dict }}
{{- $ingressEnabled := and .Values.ingress.enabled .Values.ingress.apiHost .Values.ingress.konnectivityHost }}
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: K0smotronControlPlane
metadata:
  name: {{ include "k0smotroncontrolplane.name" . }}
spec:
  replicas: {{ .Values.controlPlaneNumber }}
  version: {{ .Values.k0s.version | replace "+" "-" }}
  {{- with .Values.k0smotron.service }}
  service:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if $ingressEnabled }}
  ingress:
    deploy: true
    className: {{ .Values.ingress.className }}
    {{- with .Values.ingress.annotations }}
    annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    port: {{ .Values.ingress.port }}
    apiHost: {{ .Values.ingress.apiHost }}
    konnectivityHost: {{ .Values.ingress.konnectivityHost }}
  {{- end }}
  {{- if $global.registry }}
  image: {{ $global.registry }}/k0sproject/k0s
  etcd:
    image: "{{ $global.registry }}/k0sproject/etcd:v3.5.13"
  {{- end }}
  {{- if or $global.registryCertSecret .Values.auth.configSecret.name .Values.dataSource.caSecret.name }}
  mounts:
    {{- if $global.registryCertSecret }}
    - path: /usr/local/share/ca-certificates/registry
      secret:
        defaultMode: 420
        items:
          - key: ca.crt
            path: ca.crt
        secretName: {{ $global.registryCertSecret }}
    {{- end }}
    {{- if .Values.auth.configSecret.name }}
    - path: {{ include "authentication-config.dir" . }}
      secret:
        defaultMode: 420
        items:
          - key: {{ .Values.auth.configSecret.key }}
            path: {{ include "authentication-config.file" . }}
        secretName: {{ .Values.auth.configSecret.name }}
    {{- end }}
    {{- if .Values.dataSource.caSecret.name }}
    - path: /var/lib/k0s/kine-ca
      secret:
        defaultMode: 420
        items:
          - key: {{ .Values.dataSource.caSecret.key }}
            path: ca.crt
        secretName: {{ .Values.dataSource.caSecret.name }}
    {{- end }}
  {{- end }}
  {{- if .Values.dataSource.kineDataSourceSecretName }}
  kineDataSourceSecretName: {{ .Values.dataSource.kineDataSourceSecretName }}
  {{- end }}
  manifests:
    - name: manifests
      configMap:
        name: {{ include "k0smotroncontrolplane.name" . }}-manifests
    {{- if $global.registryCredentialSecret }}
    - name: helm-registry-credentials
      secret:
        secretName: {{ $global.registryCredentialSecret }}
        items:
          - key: registryCredential
            path: helm-registry-credentials.yaml
    {{- end }}
  controllerPlaneFlags:
    - --enable-cloud-provider=true
    - --debug=true
    {{- range $arg := .Values.k0smotron.controllerPlaneFlags }}
    - {{ toYaml $arg }}
    {{- end }}
  k0sConfig:
    apiVersion: k0s.k0sproject.io/v1beta1
    kind: ClusterConfig
    metadata:
      name: k0s
    spec:
      api:
        extraArgs:
          {{- if .Values.auth.configSecret.name }}
          authentication-config: {{ include "authentication-config.fullpath" . }}
          {{- end }}
          {{- with .Values.k0s.api.extraArgs }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
      {{- with .Values.k0s.network }}
      network: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- if $global.registry }}
      images:
        repository: "{{ $global.registry }}"
      {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k0smotroncontrolplane.name" . }}-manifests
data:
  1-chart-openstack-cloud-controller-manager.yaml: |
    apiVersion: helm.k0sproject.io/v1beta1
    kind: Chart
    metadata:
      name: openstack-cloud-controller-manager
      namespace: kube-system
    spec:
      {{- if not $global.registry }}
      repository:
        url: https://kubernetes.github.io/cloud-provider-openstack/
      {{- end }}
      {{- if or $global.registryCredentialSecret $global.registryCertSecret }}
      repository:
        {{- if $global.registryCredentialSecret }}
        configFrom:
          secretRef:
            name: {{ $global.registryCredentialSecret }}
        {{- end }}
        {{- if $global.registryCertSecret }}
        caFile: /usr/local/share/ca-certificates/registry/ca.crt
        {{- end }}
      {{- end }}
      {{- if $global.registry }}
      chartName: oci://{{ $global.registry }}/charts/openstack-cloud-controller-manager
      {{- else }}
      chartName: openstack-cloud-controller-manager/openstack-cloud-controller-manager
      {{- end }}
      version: 2.31.1
      order: 1
      releaseName: openstack-cloud-controller-manager
      namespace: kube-system
      values: |
        {{- if $global.registry }}
        image:
          repository: {{ $global.registry }}/provider-os/openstack-cloud-controller-manager
        {{- end }}
        secret:
          enabled: true
          name: openstack-cloud-config
          create: false
        nodeSelector: null
        tolerations:
          - key: node.cloudprovider.kubernetes.io/uninitialized
            value: "true"
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
          - key: node-role.kubernetes.io/master
            effect: NoSchedule
          - key: node.kubernetes.io/not-ready
            effect: NoSchedule
        extraEnv:
          - name: OS_CCM_REGIONAL
            value: {{ .Values.ccmRegional | quote }}
          {{- if $ingressEnabled }}
          - name: KUBERNETES_SERVICE_HOST
            value: {{ .Values.ingress.apiHost }}
          - name: KUBERNETES_SERVICE_PORT
            value: {{ .Values.ingress.port | quote }}
          {{- end }}
        extraVolumes:
          - name: flexvolume-dir
            hostPath:
              path: /usr/libexec/kubernetes/kubelet-plugins/volume/exec
          - name: k8s-certs
            hostPath:
              path: /etc/kubernetes/pki
          {{- if and .Values.identityRef.caCert .Values.identityRef.caCert.secretName }}
          - name: cloud-ca-cert
            secret:
              secretName: {{ .Values.identityRef.caCert.secretName }}
          {{- end }}
        extraVolumeMounts:
          - name: flexvolume-dir
            mountPath: /usr/libexec/kubernetes/kubelet-plugins/volume/exec
            readOnly: true
          - name: k8s-certs
            mountPath: /etc/kubernetes/pki
            readOnly: true
          {{- if and .Values.identityRef.caCert .Values.identityRef.caCert.secretName }}
          - name: cloud-ca-cert
            mountPath: {{ .Values.identityRef.caCert.path }}
          {{- end }}
  2-chart-openstack-cinder-csi.yaml: |
    apiVersion: helm.k0sproject.io/v1beta1
    kind: Chart
    metadata:
      name: openstack-cinder-csi
      namespace: kube-system
    spec:
      {{- if not $global.registry }}
      repository:
        url: https://kubernetes.github.io/cloud-provider-openstack/
      {{- end }}
      {{- if $global.registryCredentialSecret }}
      repository:
        configFrom:
          secretRef:
            name: {{ $global.registryCredentialSecret }}
        {{- if $global.registryCertSecret }}
        caFile: /usr/local/share/ca-certificates/registry/ca.crt
        {{- end }}
      {{- end }}
      {{- if $global.registry }}
      chartName: oci://{{ $global.registry }}/charts/openstack-cinder-csi
      {{- else }}
      chartName: openstack-cinder-csi/openstack-cinder-csi
      {{- end }}
      version: 2.31.2
      order: 2
      releaseName: openstack-cinder-csi
      namespace: kube-system
      values: |
        storageClass:
          enabled: true
          delete:
            isDefault: true
            allowVolumeExpansion: true
          retain:
            isDefault: false
            allowVolumeExpansion: false
        secret:
          enabled: true
          name: openstack-cloud-config
          create: false
        csi:
          {{- if $global.registry }}
          attacher:
            image:
              repository: {{ $global.registry }}/sig-storage/csi-attacher
          provisioner:
            image:
              repository: {{ $global.registry }}/sig-storage/csi-provisioner
          snapshotter:
            image:
              repository: {{ $global.registry }}/sig-storage/csi-snapshotter
          resizer:
            image:
              repository: {{ $global.registry }}/sig-storage/csi-resizer
          livenessprobe:
            image:
              repository: {{ $global.registry }}/sig-storage/livenessprobe
          nodeDriverRegistrar:
            image:
              repository: {{ $global.registry }}/sig-storage/csi-node-driver-registrar
          {{- end }}
          plugin:
            {{- if $global.registry }}
            image:
              repository: {{ $global.registry }}/provider-os/cinder-csi-plugin
            {{- end }}
            nodePlugin:
              kubeletDir: /var/lib/k0s/kubelet
            {{- if and .Values.identityRef.caCert .Values.identityRef.caCert.secretName }}
            volumes:
            - name: cloud-ca-cert
              secret:
                secretName: {{ .Values.identityRef.caCert.secretName }}
            volumeMounts:
            - name: cloud-config
              mountPath: /etc/kubernetes
              readOnly: true
            - name: cloud-ca-cert
              mountPath: {{ .Values.identityRef.caCert.path }}
           {{- end }}
