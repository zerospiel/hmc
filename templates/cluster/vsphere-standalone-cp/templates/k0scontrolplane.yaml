{{- $global := .Values.global | default dict }}
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: K0sControlPlane
metadata:
  name: {{ include "k0scontrolplane.name" . }}
spec:
  replicas: {{ .Values.controlPlaneNumber }}
  version: {{ .Values.k0s.version  | quote }}
  k0sConfigSpec:
    {{- if $global.k0sURL }}
    downloadURL: "{{ $global.k0sURL }}/k0s-{{ .Values.k0s.version }}-{{ .Values.k0s.arch }}"
    {{- end }}
    files:
      - path: /home/{{ .Values.controlPlane.ssh.user }}/.ssh/authorized_keys
        permissions: "0600"
        content: "{{ trim .Values.controlPlane.ssh.publicKey }}"
      {{- if or $global.registryCertSecret $global.k0sURLCertSecret }}
      {{/* Drop CAs into a dir Go's crypto/x509 always scans (https://github.com/golang/go/blob/d468ad3648be469ffc4090e4586c29709182d6b6/src/crypto/x509/root_linux.go#L20).
           Works on Debian/RHEL/SUSE/Alpine/Flatcar without update-ca-*; covers containerd,
           k0s controller and HelmController (all Go). curl for the k0s binary is handled
           separately via preK0sCommands below */}}
      {{- $certs := dict "kcm-registry.pem" $global.registryCertSecret "kcm-k0s-url.pem" $global.k0sURLCertSecret }}
      {{- range $name, $secret := $certs }}
      {{- if $secret }}
      - contentFrom:
          secretRef:
            name: {{ $secret }}
            key: ca.crt
        permissions: "0644"
        path: /etc/ssl/certs/{{ $name }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- if .Values.auth.configSecret.name }}
      - contentFrom:
          secretRef:
            name: {{ .Values.auth.configSecret.name  | quote }}
            key: {{ default "config" .Values.auth.configSecret.key  | quote }}
        permissions: "0644"
        path: {{ include "authentication-config.fullpath" . }}
      {{- end }}
      {{- if .Values.encryption.configSecret.name }}
      - contentFrom:
          secretRef:
            name: {{ .Values.encryption.configSecret.name  | quote }}
            key: {{ default "config" .Values.encryption.configSecret.key  | quote }}
        permissions: "0644"
        path: {{ include "encryption-config.fullpath" . }}
      {{- end }}
      {{- if .Values.audit.policyRef.name }}
      - contentFrom:
          configMapRef:
            name: {{ .Values.audit.policyRef.name  | quote }}
            key: {{ default "policy" .Values.audit.policyRef.key  | quote }}
        permissions: "0644"
        path: {{ include "audit-policy.fullpath" . }}
      {{- end }}
      {{- if $global.registryCredentialSecret }}
      - contentFrom:
          secretRef:
            name: {{ $global.registryCredentialSecret }}
            key: registryCredential
        permissions: "0644"
        path: /var/lib/k0s/manifests/kcm/helm-registry-credentials.yaml
      - contentFrom:
          secretRef:
            name: {{ $global.registryCredentialSecret }}
            key: containerdAuth
        permissions: "0664"
        path: /etc/k0s/containerd.d/registry-auth.toml
      {{- end }}
      - path: /var/lib/k0s/manifests/kcm/1-chart-kube-vip.yaml
        permissions: "0644"
        content: |
          apiVersion: helm.k0sproject.io/v1beta1
          kind: Chart
          metadata:
            name: kube-vip
            namespace: kube-system
          spec:
            {{- if not $global.registry }}
            repository:
              url: https://kube-vip.github.io/helm-charts
            {{- end }}
            {{- if $global.registryCredentialSecret }}
            repository:
              configFrom:
                secretRef:
                  name: {{ $global.registryCredentialSecret }}
            {{- end }}
            {{- if $global.registry }}
            chartName: oci://{{ $global.registry }}/charts/kube-vip
            {{- else }}
            chartName: kube-vip/kube-vip
            {{- end }}
            version: 0.9.9
            releaseName: kube-vip
            namespace: kube-system
            order: 1
            values: |
              {{- if $global.registry }}
              image:
                repository: {{ $global.registry }}/kube-vip/kube-vip
              {{- end }}
              config:
                address: {{ .Values.controlPlaneEndpointIP  | quote }}
              env:
                svc_enable: "true"
                cp_enable: "true"
                lb_enable: "false"
              nodeSelector:
                node-role.kubernetes.io/control-plane: "true"
              tolerations:
                - effect: NoSchedule
                  key: node-role.kubernetes.io/master
                  operator: Exists
                - effect: NoSchedule
                  key: node-role.kubernetes.io/control-plane
                  operator: Exists
                - effect: NoSchedule
                  key: node.cloudprovider.kubernetes.io/uninitialized
                  value: "true"
      - path: /var/lib/k0s/manifests/kcm/2-chart-vsphere-cpi.yaml
        permissions: "0644"
        content: |
          apiVersion: helm.k0sproject.io/v1beta1
          kind: Chart
          metadata:
            name: vsphere-cpi
            namespace: kube-system
          spec:
            {{- if not $global.registry }}
            repository:
              url: https://kubernetes.github.io/cloud-provider-vsphere
            {{- end }}
            {{- if $global.registryCredentialSecret }}
            repository:
              configFrom:
                secretRef:
                  name: {{ $global.registryCredentialSecret }}
            {{- end }}
            {{- if $global.registry }}
            chartName: oci://{{ $global.registry }}/charts/vsphere-cpi
            {{- else }}
            chartName: vsphere-cpi/vsphere-cpi
            {{- end }}
            version: 1.35.1
            releaseName: vsphere-cpi
            namespace: kube-system
            order: 2
            values: |
              config:
                enabled: false
              daemonset:
                {{- if $global.registry }}
                image: {{ $global.registry }}/cloud-pv-vsphere/cloud-provider-vsphere
                {{- end }}
                tolerations:
                  - effect: NoSchedule
                    key: node.cloudprovider.kubernetes.io/uninitialized
                    value: "true"
                  - effect: NoSchedule
                    key: node-role.kubernetes.io/master
                    operator: Exists
                  - effect: NoSchedule
                    key: node-role.kubernetes.io/control-plane
                    operator: Exists
                  - effect: NoSchedule
                    key: node.kubernetes.io/not-ready
                    operator: Exists
                  - key: CriticalAddonsOnly
                    effect: NoExecute
                    operator: Exists
      - path: /var/lib/k0s/manifests/kcm/3-chart-vsphere-csi-driver.yaml
        permissions: "0644"
        content: |
          apiVersion: helm.k0sproject.io/v1beta1
          kind: Chart
          metadata:
            name: vsphere-csi-driver
            namespace: kube-system
          spec:
            {{- if not $global.registry }}
            repository:
              url: https://charts.mirantis.com
            {{- end }}
            {{- if and $global.registry $global.registryCredentialSecret }}
            repository:
              configFrom:
                secretRef:
                  name: {{ $global.registryCredentialSecret }}
            {{- end }}
            {{- if $global.registry }}
            chartName: oci://{{ $global.registry }}/charts/vsphere-csi-driver
            {{- else }}
            chartName: vsphere-csi-driver/vsphere-csi-driver
            {{- end }}
            version: 0.0.4
            releaseName: vsphere-csi-driver
            namespace: kube-system
            order: 3
            values: |
              vcenterConfig:
                enabled: false
              node:
                kubeletPath: /var/lib/k0s/kubelet
              defaultStorageClass:
                enabled: true
              images:
                driver:
                  {{- if $global.registry }}
                  repo: {{ $global.registry }}/csi-vsphere/driver
                  {{- end }}
                  tag: v3.7.0
                syncer:
                  {{- if $global.registry }}
                  repo: {{ $global.registry }}/csi-vsphere/syncer
                  {{- end }}
                  tag: v3.7.0
                {{- if $global.registry }}
                nodeDriverRegistrar:
                  repo: {{ $global.registry }}/sig-storage/csi-node-driver-registrar
                csiAttacher:
                  repo: {{ $global.registry }}/sig-storage/csi-attacher
                csiResizer:
                  repo: {{ $global.registry }}/sig-storage/csi-resizer
                csiProvisioner:
                  repo: {{ $global.registry }}/sig-storage/csi-provisioner
                csiSnapshotter:
                  repo: {{ $global.registry }}/sig-storage/csi-snapshotter
                livenessProbe:
                  repo: {{ $global.registry }}/sig-storage/livenessprobe
                {{- end }}
    preK0sCommands:
      - chown {{ .Values.controlPlane.ssh.user }} /home/{{ .Values.controlPlane.ssh.user }}/.ssh/authorized_keys
      - sed -i 's/"externalAddress":"{{ .Values.controlPlaneEndpointIP }}",//' /etc/k0s.yaml
      {{- if $global.k0sURLCertSecret }}
      {{/* curl (used to fetch the k0s binary) reads the OS-generated bundle; install the CA into the anchor dir so update-ca-* rebuilds preserve it */}}
      - "sudo sh -c 'src=/etc/ssl/certs/kcm-k0s-url.pem; if [ -d /usr/local/share/ca-certificates ]; then install -m 0644 \"$src\" /usr/local/share/ca-certificates/kcm-k0s-url.crt && update-ca-certificates; elif [ -d /etc/pki/ca-trust/source/anchors ]; then install -m 0644 \"$src\" /etc/pki/ca-trust/source/anchors/kcm-k0s-url.pem && update-ca-trust extract; elif [ -d /etc/pki/trust/anchors ]; then install -m 0644 \"$src\" /etc/pki/trust/anchors/kcm-k0s-url.pem && update-ca-certificates; fi' || true"
      {{- end }}
    {{- if and .Values.audit.policyRef.name .Values.audit.logPath (ne .Values.audit.logPath "-") }}
    {{- $logPath := .Values.audit.logPath }}
    {{- $logDir := dir $logPath }}
    postK0sCommands:
    - 'sudo mkdir -p {{ $logDir }}'
    - 'sudo chown kube-apiserver:kube-apiserver {{ $logDir }}'
    {{- end }}
    args:
      - --enable-worker
      {{- if eq (int .Values.workersNumber) 0 }}
      - --no-taints
      {{- end }}
      - --disable-components=konnectivity-server
      - --kubelet-extra-args="--fail-cgroupv1=false"
      {{- range $arg := .Values.k0s.cpArgs }}
      - {{ toYaml $arg }}
      {{- end }}
    k0s:
      apiVersion: k0s.k0sproject.io/v1beta1
      kind: ClusterConfig
      metadata:
        name: k0s
      spec:
        api:
          sans:
            - {{ .Values.controlPlaneEndpointIP }}
          extraArgs:
            {{- if not .Values.auth.configWithAnon }}
            anonymous-auth: "true"
            {{- end }}
            {{- if .Values.auth.configSecret.name }}
            authentication-config: {{ include "authentication-config.fullpath" . }}
            {{- end }}
            {{- if .Values.encryption.configSecret.name }}
            encryption-provider-config: {{ include "encryption-config.fullpath" . }}
            {{- if .Values.encryption.automaticReload }}
            encryption-provider-config-automatic-reload: "true"
            {{- end }}
            {{- end }}
            {{- if .Values.audit.policyRef.name }}
            audit-policy-file: {{ include "audit-policy.fullpath" . }}
            {{- with .Values.audit.logPath }}
            audit-log-path: {{ . | quote }}
            {{- end }}
            {{- if and .Values.audit.logPath (ne .Values.audit.logPath "-") }}
            {{- with .Values.audit.logMaxAge }}
            audit-log-maxage: {{ . | quote }}
            {{- end }}
            {{- with .Values.audit.logMaxBackup }}
            audit-log-maxbackup: {{ . | quote }}
            {{- end }}
            {{- with .Values.audit.logMaxSize }}
            audit-log-maxsize: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- with .Values.k0s.api.extraArgs }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.k0s.network }}
        network: {{ toYaml . | nindent 10 }}
        {{- end }}
        {{- if $global.registry }}
        images:
          repository: "{{ $global.registry }}"
        {{- end }}
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: VSphereMachineTemplate
      name: {{ include "vspheremachinetemplate.controlplane.name" . }}
      namespace: {{ .Release.Namespace }}
