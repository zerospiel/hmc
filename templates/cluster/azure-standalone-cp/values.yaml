# Cluster parameters
controlPlaneNumber: 3 # @schema description: The number of the control-plane machines; minimum: 1; type: integer; required: true
workersNumber: 2 # @schema description: The number of the worker machines. Set to 0 to skip provisioning a dedicated worker MachineDeployment and run workloads on the control-plane nodes; minimum: 0; type: integer; required: true

clusterNetwork:
  pods:
    cidrBlocks:
    - "10.244.0.0/16"
  services:
    cidrBlocks:
    - "10.96.0.0/12"

clusterLabels: {}
clusterAnnotations: {}

auth: # @schema description: Authentication settings for the cluster, optional, auto-populated; type: object
  configWithAnon: false # @schema description: Service field to remove the --anonymous-auth flag from kube-apiserver, auto-populated; type: boolean
  configSecret: # @schema description: Reference to the Secret containing the cluster’s AuthenticationConfiguration, auto-populated; type: object
    name: "" # @schema description: Name of the Secret that stores the AuthenticationConfiguration, auto-populated; type: string
    key: "config" # @schema description: The data key in the Secret that contains the AuthenticationConfiguration, auto-populated; type: string
    hash: "" # @schema description: Hash of the AuthenticationConfiguration data stored in the Secret, auto-populated; type: string

encryption: # @schema description: Encryption-at-rest settings for kube-apiserver storage config; type: object
  automaticReload: true # @schema description: Enables kube-apiserver automatic reload for encryption provider config when supported; type: boolean
  configSecret: # @schema description: Reference to the Secret containing the EncryptionConfiguration; type: object
    name: "" # @schema description: Name of the Secret that stores the EncryptionConfiguration; type: string
    key: "config" # @schema description: The data key in the Secret that contains the EncryptionConfiguration; type: string
    hash: "" # @schema description: Hash of the EncryptionConfiguration data stored in the Secret. If not set, it is calculated automatically from Secret data; type: string

audit: # @schema description: Audit logging settings for kube-apiserver, optional; type: object
  policyRef: # @schema description: Reference to the ConfigMap containing the audit policy, auto-populated; type: object
    name: "" # @schema description: Name of the ConfigMap that stores the audit policy, auto-populated; type: string
    key: "policy" # @schema description: The data key in the ConfigMap that contains the audit policy, auto-populated; type: string
    hash: "" # @schema description: Hash of the audit policy data stored in the ConfigMap, auto-populated; type: string
  logPath: "-" # @schema description: The file path where the kube-apiserver should write audit logs. Not specifying this flag disables log backend. "-" means standard out; type: string
  logMaxAge: 7 # @schema description: The maximum number of days to retain old audit log files before removal; type: integer; minimum: 1
  logMaxSize: 50 # @schema description: The maximum size in megabytes of the audit log file before it gets rotated; type: integer; minimum: 1
  logMaxBackup: 7 # @schema description: The maximum number of rotated audit log files to retain; type: integer; minimum: 1

# Azure cluster parameters
location: "" # @schema description: Azure location to use; type: string; required: true
subscriptionID: "" # @schema description: Subscription ID where all cluster resources will be created; type: string; required: true
bastion:
  enabled: false
  bastionSpec:
    azureBastion: {}
clusterIdentity:
  name: ""
  namespace: kcm-system
# Azure machines parameters
controlPlane: # @schema description: Control plane nodes parameters; type: object; required: true
  sshPublicKey: ""
  vmSize: "" # @schema description: VM size to use for control plane nodes; type: string; required: true
  rootVolumeSize: 30
  image:
    id: ""
    computeGallery: {}
    marketplace:
      publisher: "cncf-upstream"
      offer: "capi"
      sku: "ubuntu-2204-gen1"
      version: "130.3.20240717"

worker: # @schema description: Worker nodes parameters; type: object; required: true
  sshPublicKey: ""
  vmSize: "" # @schema description: VM size to use for worker nodes; type: string; required: true
  rootVolumeSize: 30
  image:
    id: ""
    computeGallery: {}
    marketplace:
      publisher: "cncf-upstream"
      offer: "capi"
      sku: "ubuntu-2204-gen1"
      version: "130.3.20240717"

# K0s parameters
k0s: # @schema description: K0s parameters; type: object
  version: v1.35.4+k0s.0 # @schema description: K0s version; type: string
  arch: amd64 # @schema description: K0s Download URL Arch; type: string; enum: amd64, arm64, arm; default: amd64
  cpArgs: [] # @schema description: Args specifies extra arguments to be passed to k0s controller. See: https://docs.k0sproject.io/stable/cli/k0s_controller/; type: array; item: string; uniqueItems: true
  workerArgs: [] # @schema description: Args specifies extra arguments to be passed to k0s worker. See: https://docs.k0sproject.io/stable/worker-node-config/ See: https://docs.k0sproject.io/stable/cli/k0s_worker/; type: array; item: string; uniqueItems: true
  api: # @schema description: Kubernetes API server parameters; type: object
    extraArgs: {} # @schema description: Map of key-values (strings) for any extra arguments to pass down to Kubernetes api-server process; type: object; additionalProperties: true
  network: # @schema description: Kubernetes cluster network configuration; type: object; additionalProperties: true
    provider: calico # @schema description: Network provider to use; type: string; examples: [kuberouter, calico, custom]; minLength: 1
    calico: # @schema description: Calico-specific configuration; type: object; additionalProperties: true
      mode: vxlan # @schema description: Calico network mode; type: string; examples: [ipip, vxlan, never]; minLength: 1
