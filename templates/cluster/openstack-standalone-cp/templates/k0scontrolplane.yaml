{{- $global := .Values.global | default dict }}
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: K0sControlPlane
metadata:
  name: {{ include "k0scontrolplane.name" . }}
spec:
  replicas: {{ .Values.controlPlaneNumber }}
  version: {{ .Values.k0s.version  | quote }}
  k0sConfigSpec:
    {{- if $global.k0sURL }}
    downloadURL: "{{ $global.k0sURL }}/k0s-{{ .Values.k0s.version }}-{{ .Values.k0s.arch }}"
    {{- end }}
    files:
      {{- $certs := dict "registry.crt" $global.registryCertSecret "k0s-url.crt" $global.k0sURLCertSecret }}
      {{- range $path, $secret := $certs }}
      {{- if $secret }}
      - contentFrom:
          secretRef:
            name: {{ $secret }}
            key: ca.crt
        permissions: "0664"
        path: /usr/local/share/ca-certificates/{{ $path }}
      {{- end }}
      {{- end }}
      {{- if .Values.auth.configSecret.name }}
      - contentFrom:
          secretRef:
            name: {{ .Values.auth.configSecret.name  | quote }}
            key: {{ default "config" .Values.auth.configSecret.key  | quote }}
        permissions: "0644"
        path: {{ include "authentication-config.fullpath" . }}
      {{- end }}
      {{- if .Values.encryption.configSecret.name }}
      - contentFrom:
          secretRef:
            name: {{ .Values.encryption.configSecret.name  | quote }}
            key: {{ default "config" .Values.encryption.configSecret.key  | quote }}
        permissions: "0644"
        path: {{ include "encryption-config.fullpath" . }}
      {{- end }}
      {{- if .Values.audit.policyRef.name }}
      - contentFrom:
          configMapRef:
            name: {{ .Values.audit.policyRef.name  | quote }}
            key: {{ default "policy" .Values.audit.policyRef.key  | quote }}
        permissions: "0644"
        path: {{ include "audit-policy.fullpath" . }}
      {{- end }}
      {{- if $global.registryCredentialSecret }}
      - contentFrom:
          secretRef:
            name: {{ $global.registryCredentialSecret }}
            key: registryCredential
        permissions: "0644"
        path: /var/lib/k0s/manifests/kcm/helm-registry-credentials.yaml
      - contentFrom:
          secretRef:
            name: {{ $global.registryCredentialSecret }}
            key: containerdAuth
        permissions: "0664"
        path: /etc/k0s/containerd.d/registry-auth.toml
      {{- end }}
      - path: /var/lib/k0s/manifests/kcm/1-chart-openstack-cloud-controller-manager.yaml
        permissions: "0644"
        content: |
          apiVersion: helm.k0sproject.io/v1beta1
          kind: Chart
          metadata:
            name: openstack-cloud-controller-manager
            namespace: kube-system
          spec:
            {{- if not $global.registry }}
            repository:
              url: https://kubernetes.github.io/cloud-provider-openstack/
            {{- end }}
            {{- if $global.registryCredentialSecret }}
            repository:
              configFrom:
                secretRef:
                  name: {{ $global.registryCredentialSecret }}
            {{- end }}
            {{- if $global.registry }}
            chartName: oci://{{ $global.registry }}/charts/openstack-cloud-controller-manager
            {{- else }}
            chartName: openstack-cloud-controller-manager/openstack-cloud-controller-manager
            {{- end }}
            version: 2.35.0
            order: 1
            releaseName: openstack-cloud-controller-manager
            namespace: kube-system
            values: |
              {{- if .Values.ccmEnableUniqueClusterName }}
              cluster:
                name: {{ include "ccm-cluster.name" . }}
              {{- end }}
              {{- if $global.registry }}
              image:
                repository: {{ $global.registry }}/provider-os/openstack-cloud-controller-manager
              {{- end }}
              secret:
                enabled: true
                name: openstack-cloud-config
                create: false
              nodeSelector:
                node-role.kubernetes.io/control-plane: "true"
              tolerations:
                - key: node.cloudprovider.kubernetes.io/uninitialized
                  value: "true"
                  effect: NoSchedule
                - key: node-role.kubernetes.io/control-plane
                  effect: NoSchedule
                - key: node-role.kubernetes.io/master
                  effect: NoSchedule
              extraEnv:
                - name: OS_CCM_REGIONAL
                  value: {{ .Values.ccmRegional | quote }}
              extraVolumes:
                - name: flexvolume-dir
                  hostPath:
                    path: /usr/libexec/kubernetes/kubelet-plugins/volume/exec
                - name: k8s-certs
                  hostPath:
                    path: /etc/kubernetes/pki
                {{- if and .Values.identityRef.caCert .Values.identityRef.caCert.secretName }}
                - name: cloud-ca-cert
                  secret:
                    secretName: {{ .Values.identityRef.caCert.secretName  | quote }}
                {{- end }}
              extraVolumeMounts:
                - name: flexvolume-dir
                  mountPath: /usr/libexec/kubernetes/kubelet-plugins/volume/exec
                  readOnly: true
                - name: k8s-certs
                  mountPath: /etc/kubernetes/pki
                  readOnly: true
                {{- if and .Values.identityRef.caCert .Values.identityRef.caCert.secretName }}
                - name: cloud-ca-cert
                  mountPath: {{ .Values.identityRef.caCert.path  | quote }}
                {{- end }}
      - path: /var/lib/k0s/manifests/kcm/2-chart-openstack-cinder-csi.yaml
        permissions: "0644"
        content: |
          apiVersion: helm.k0sproject.io/v1beta1
          kind: Chart
          metadata:
            name: openstack-cinder-csi
            namespace: kube-system
          spec:
            {{- if not $global.registry }}
            repository:
              url: https://kubernetes.github.io/cloud-provider-openstack/
            {{- end }}
            {{- if $global.registryCredentialSecret }}
            repository:
              configFrom:
                secretRef:
                  name: {{ $global.registryCredentialSecret }}
            {{- end }}
            {{- if $global.registry }}
            chartName: oci://{{ $global.registry }}/charts/openstack-cinder-csi
            {{- else }}
            chartName: openstack-cinder-csi/openstack-cinder-csi
            {{- end }}
            version: 2.35.0
            order: 2
            releaseName: openstack-cinder-csi
            namespace: kube-system
            values: |
              storageClass:
                enabled: true
                delete:
                  isDefault: true
                  allowVolumeExpansion: true
                retain:
                  isDefault: false
                  allowVolumeExpansion: false
              secret:
                enabled: true
                name: openstack-cloud-config
                create: false
              csi:
                {{- if $global.registry }}
                attacher:
                  image:
                    repository: {{ $global.registry }}/sig-storage/csi-attacher
                provisioner:
                  image:
                    repository: {{ $global.registry }}/sig-storage/csi-provisioner
                snapshotter:
                  image:
                    repository: {{ $global.registry }}/sig-storage/csi-snapshotter
                resizer:
                  image:
                    repository: {{ $global.registry }}/sig-storage/csi-resizer
                livenessprobe:
                  image:
                    repository: {{ $global.registry }}/sig-storage/livenessprobe
                nodeDriverRegistrar:
                  image:
                    repository: {{ $global.registry }}/sig-storage/csi-node-driver-registrar
                {{- end }}
                plugin:
                  {{- if $global.registry }}
                  image:
                    repository: {{ $global.registry }}/provider-os/cinder-csi-plugin
                  {{- end }}
                  nodePlugin:
                    kubeletDir: /var/lib/k0s/kubelet
                  {{- if and .Values.identityRef.caCert .Values.identityRef.caCert.secretName }}
                  volumes:
                  - name: cloud-ca-cert
                    secret:
                      secretName: {{ .Values.identityRef.caCert.secretName  | quote }}
                  volumeMounts:
                  - name: cloud-config
                    mountPath: /etc/kubernetes
                    readOnly: true
                  - name: cloud-ca-cert
                    mountPath: {{ .Values.identityRef.caCert.path  | quote }}
                 {{- end }}
    {{- if or $global.registryCertSecret $global.k0sURLCertSecret }}
    preStartCommands:
    - "sudo update-ca-certificates"
    {{- end }}
    {{- if and .Values.audit.policyRef.name .Values.audit.logPath (ne .Values.audit.logPath "-") }}
    {{- $logPath := .Values.audit.logPath }}
    {{- $logDir := dir $logPath }}
    postStartCommands:
    - 'sudo mkdir -p {{ $logDir }}'
    - 'sudo chown kube-apiserver:kube-apiserver {{ $logDir }}'
    {{- end }}
    args:
      - --enable-worker
      {{- if eq (int .Values.workersNumber) 0 }}
      - --no-taints
      {{- end }}
      - --enable-cloud-provider
      - --kubelet-extra-args="--cloud-provider=external --fail-cgroupv1=false"
      - --disable-components=konnectivity-server
      {{- range $arg := .Values.k0s.cpArgs }}
      - {{ toYaml $arg }}
      {{- end }}
    k0s:
      apiVersion: k0s.k0sproject.io/v1beta1
      kind: ClusterConfig
      metadata:
        name: k0s
      spec:
        api:
          extraArgs:
            {{- if not .Values.auth.configWithAnon }}
            anonymous-auth: "true"
            {{- end }}
            {{- if .Values.auth.configSecret.name }}
            authentication-config: {{ include "authentication-config.fullpath" . }}
            {{- end }}
            {{- if .Values.encryption.configSecret.name }}
            encryption-provider-config: {{ include "encryption-config.fullpath" . }}
            {{- if .Values.encryption.automaticReload }}
            encryption-provider-config-automatic-reload: "true"
            {{- end }}
            {{- end }}
            {{- if .Values.audit.policyRef.name }}
            audit-policy-file: {{ include "audit-policy.fullpath" . }}
            {{- with .Values.audit.logPath }}
            audit-log-path: {{ . | quote }}
            {{- end }}
            {{- if and .Values.audit.logPath (ne .Values.audit.logPath "-") }}
            {{- with .Values.audit.logMaxAge }}
            audit-log-maxage: {{ . | quote }}
            {{- end }}
            {{- with .Values.audit.logMaxBackup }}
            audit-log-maxbackup: {{ . | quote }}
            {{- end }}
            {{- with .Values.audit.logMaxSize }}
            audit-log-maxsize: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- with .Values.k0s.api.extraArgs }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.k0s.network }}
        network: {{ toYaml . | nindent 10 }}
        {{- end }}
        {{- if $global.registry }}
        images:
          repository: "{{ $global.registry }}"
        {{- end }}
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: OpenStackMachineTemplate
      name: {{ include "openstackmachinetemplate.controlplane.name" . }}
      namespace: {{ .Release.Namespace }}
