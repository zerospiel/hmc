name: Build latest binaries
on:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-and-push:
    name: Build and Push Binaries
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify generated files are up-to-date
        run: |
          set -euo pipefail
          make generate-all
          git add -N .
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of date, please run 'make generate-all'"
            git diff --name-only
            exit 1
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Get version
        id: version
        run: |
          GIT_VERSION=$(git describe --tags --always)
          echo "version=${GIT_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Cache GoReleaser binary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /opt/hostedtoolcache/goreleaser
          key: goreleaser-${{ runner.os }}-${{ runner.arch }}-v2
          restore-keys: |
            goreleaser-${{ runner.os }}-${{ runner.arch }}-

      - name: Build and push KCM controller image to the public repository
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ghcr.io/k0rdent/kcm
          IMAGE_NAME: controller-ci
          TELEMETRY_IMAGE_NAME: telemetry-ci
          VERSION: ${{ steps.version.outputs.version }}
          SKIP_SCM_RELEASE: true
          SEGMENT_TOKEN: ${{ secrets.SEGMENT_TOKEN_DEV }}
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --verbose --skip=validate

      - name: Prepare and push KCM template charts to the public repository
        env:
          REGISTRY_REPO: oci://ghcr.io/k0rdent/kcm/charts-ci
          VERSION: ${{ steps.version.outputs.version }}
          IMG: ghcr.io/k0rdent/kcm/controller-ci:${{ steps.version.outputs.version }}
          IMG_TELEMETRY: ghcr.io/k0rdent/kcm/telemetry-ci:${{ steps.version.outputs.version }}
        run: |
          make set-kcm-repo
          make set-templates-repo
          make kcm-chart-release
          make helm-push

      # publish rendered release.yaml as a workflow artifact (see #2808)
      - name: Render release.yaml
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          make OUTPUT=./release.yaml generate-release
          echo "Rendered release.yaml (head):"
          head -n 20 ./release.yaml

      - name: Upload release.yaml as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # stable name; downstream consumers can hard-code it
          name: release-yaml-staging
          path: ./release.yaml
          if-no-files-found: error
          retention-days: 7
          overwrite: true
