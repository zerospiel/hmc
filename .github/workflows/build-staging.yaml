name: Build staging binaries
on:
  push:
    branches:
      - main
      - '*-release'
    tags:
      - "v*.*.*" # only v-prefixed tags

# Default read-only; jobs escalate as needed
permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-and-push:
    name: Build and Push Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve base commit for generation
        id: base
        run: |
          set -euo pipefail

          base="${{ github.event.before }}"
          # for new refs/tags, "before" can be the all-zero SHA
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              base="$(git rev-parse HEAD^)"
            else
              base="$(git rev-list --max-parents=0 HEAD)"
            fi
          fi

          echo "Using BASE_COMMIT=$base"
          echo "base_commit=$base" >> "$GITHUB_OUTPUT"

      - name: Verify generated files are up-to-date
        env:
          BASE_COMMIT: ${{ steps.base.outputs.base_commit }}
          HEAD_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          make generate-all
          git add -N .
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of date, please run 'make generate-all'"
            git diff --name-only
            exit 1
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Get version
        id: version
        run: |
          set -euo pipefail
          GIT_VERSION=$(git describe --tags --always)
          echo "version=${GIT_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push KCM controller image to the public repository
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ghcr.io/k0rdent/kcm/staging
          VERSION: ${{ steps.version.outputs.version }}
          SKIP_SCM_RELEASE: true
          SEGMENT_TOKEN: ${{ secrets.SEGMENT_TOKEN_DEV }}
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --verbose --skip=validate

      - name: Prepare and push KCM template charts to the public repository
        env:
          REGISTRY_REPO: oci://ghcr.io/k0rdent/kcm/staging
          VERSION: ${{ steps.version.outputs.version }}
          IMG: ghcr.io/k0rdent/kcm/staging/controller:${{ steps.version.outputs.version }}
          IMG_TELEMETRY: ghcr.io/k0rdent/kcm/staging/telemetry:${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          make set-kcm-repo
          make set-templates-repo
          make kcm-chart-release
          make helm-push

      # publish rendered release.yaml as a workflow artifact (see #2808);
      # branch pushes only, tags carry their own release.yaml via .github/workflows/release.yml
      - name: Render release.yaml
        if: ${{ github.ref_type == 'branch' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          make OUTPUT=./release.yaml generate-release
          echo "Rendered release.yaml (head):"
          head -n 20 ./release.yaml

      - name: Upload release.yaml as workflow artifact
        if: ${{ github.ref_type == 'branch' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # stable name; downstream consumers can hard-code it
          name: release-yaml-staging
          path: ./release.yaml
          if-no-files-found: error
          retention-days: 7
          overwrite: true
