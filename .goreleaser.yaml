  #     - --label=org.opencontainers.image.description={{ .ProjectName }}
  #     - --label=org.opencontainers.image.url=https://github.com/k0rdent/kcm
  #     - --label=org.opencontainers.image.source=https://github.com/k0rdent/kcm
  #     - --label=org.opencontainers.image.version={{ .Version }}
  #     - --label=org.opencontainers.image.created={{ time "2006-01-02T15:04:05Z07:00" }}
  #     - --label=org.opencontainers.image.revision={{ .FullCommit }}
  #     - --label=org.opencontainers.image.licenses=Apache-2.0
  #     - --platform=linux/arm/v7

docker_manifests:
  - id: default
    name_template: "ghcr.io/zerospiel/hmc/controller:{{ .Version }}"
    image_templates:
      # - "ghcr.io/zerospiel/hmc/controller:{{ .Version }}-amd64"
      - "ghcr.io/zerospiel/hmc/controller:{{ .Version }}-arm64v8"
      # - "ghcr.io/zerospiel/hmc/controller:{{ .Version }}-armv7"
    skip_push: false
    use: docker
